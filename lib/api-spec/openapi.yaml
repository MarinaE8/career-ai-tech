openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: generate
    description: Career document generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateDocument
      tags: [generate]
      summary: Generate a career document via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInput"
      responses:
        "200":
          description: Generated document text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateInput:
      type: object
      properties:
        docType:
          type: string
          description: "cover | resume | linkedin"
        tone:
          type: string
          description: "faang | startup | senior | pivot"
        name:
          type: string
        currentRole:
          type: string
        yearsExp:
          type: string
        techStack:
          type: string
        achievements:
          type: string
        jobTitle:
          type: string
        company:
          type: string
        jobDesc:
          type: string
        atsKeywords:
          type: string
      required:
        - docType
        - tone
        - name
        - currentRole
        - yearsExp
        - techStack
        - achievements
        - jobTitle
        - company
        - jobDesc
    GenerateResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    GenerateError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
