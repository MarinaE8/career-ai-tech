openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: generate
    description: Career document generation
  - name: ats
    description: ATS score analysis
  - name: interview
    description: Interview preparation
  - name: salary
    description: Salary negotiation scripts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateDocument
      tags: [generate]
      summary: Generate a career document via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInput"
      responses:
        "200":
          description: Generated document text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
  /ats-score:
    post:
      operationId: scoreDocument
      tags: [ats]
      summary: Analyse a generated document against a job description for ATS fit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtsScoreInput"
      responses:
        "200":
          description: ATS score analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtsScoreResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
  /interview-prep:
    post:
      operationId: prepareInterview
      tags: [interview]
      summary: Generate interview questions with talking points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewPrepInput"
      responses:
        "200":
          description: Interview questions with talking points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewPrepResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
  /salary-negotiation:
    post:
      operationId: salaryNegotiation
      tags: [salary]
      summary: Generate a salary negotiation playbook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalaryNegotiationInput"
      responses:
        "200":
          description: Salary negotiation playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalaryNegotiationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateInput:
      type: object
      properties:
        docType:
          type: string
          description: "cover | resume | linkedin"
        tone:
          type: string
          description: "faang | startup | senior | pivot"
        name:
          type: string
        currentRole:
          type: string
        yearsExp:
          type: string
        techStack:
          type: string
        achievements:
          type: string
        jobTitle:
          type: string
        company:
          type: string
        jobDesc:
          type: string
        atsKeywords:
          type: string
      required:
        - docType
        - tone
        - name
        - currentRole
        - yearsExp
        - techStack
        - achievements
        - jobTitle
        - company
        - jobDesc
    GenerateResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    GenerateError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    InterviewPrepInput:
      type: object
      properties:
        jobTitle:
          type: string
        company:
          type: string
        jobDesc:
          type: string
        techStack:
          type: string
        tone:
          type: string
        achievements:
          type: string
      required:
        - jobTitle
        - company
        - jobDesc
        - techStack
        - tone
        - achievements
    InterviewQuestion:
      type: object
      properties:
        question:
          type: string
        category:
          type: string
        talkingPoints:
          type: array
          items:
            type: string
      required:
        - question
        - category
        - talkingPoints
    InterviewPrepResult:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/InterviewQuestion"
      required:
        - questions
    AtsScoreInput:
      type: object
      properties:
        document:
          type: string
          description: The generated career document text
        jobDesc:
          type: string
          description: The job description to score against
        atsKeywords:
          type: string
          description: Optional extra keywords to check
      required:
        - document
        - jobDesc
    AtsScoreResult:
      type: object
      properties:
        score:
          type: integer
          description: ATS keyword match score 0–100
        matched:
          type: array
          items:
            type: string
          description: Keywords found in the document
        missing:
          type: array
          items:
            type: string
          description: Important keywords absent from the document
        suggestions:
          type: array
          items:
            type: string
          description: Specific improvement suggestions
      required:
        - score
        - matched
        - missing
        - suggestions
    SalaryNegotiationInput:
      type: object
      properties:
        jobTitle:
          type: string
        company:
          type: string
        yearsExp:
          type: string
        techStack:
          type: string
        currentSalary:
          type: string
        targetSalary:
          type: string
        jobDesc:
          type: string
        tone:
          type: string
      required:
        - jobTitle
        - company
        - yearsExp
        - techStack
        - targetSalary
        - jobDesc
        - tone
    SalaryNegotiationResult:
      type: object
      properties:
        opening:
          type: string
        anchoring:
          type: string
        counteroffer:
          type: string
        batna:
          type: string
        equityAngle:
          type: string
        closingLines:
          type: array
          items:
            type: string
        doNots:
          type: array
          items:
            type: string
      required:
        - opening
        - anchoring
        - counteroffer
        - batna
        - equityAngle
        - closingLines
        - doNots
